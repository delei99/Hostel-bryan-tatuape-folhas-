services:
  # Web Service (Aplicação Node.js)
  - type: web
    name: hostel-bryan
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm db:push && vite build && esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
    startCommand: NODE_ENV=production node dist/index.js
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: "hostel-db", property: "connectionString" }
      - key: NODE_ENV
        value: production

databases:
  # Banco de Dados PostgreSQL Nativo do Render
  - name: hostel-db
    plan: free
    databaseName: hostel_db
    user: hostel_user
