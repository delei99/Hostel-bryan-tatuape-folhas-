services:
  # Web Service (Aplicação Node.js)
  - type: web
    name: hostel-bryan
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm db:push && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: "hostel-db", property: "connectionString" }
      - key: NODE_ENV
        value: production

databases:
  # Banco de Dados PostgreSQL Nativo do Render
  - name: hostel-db
    plan: free
    databaseName: hostel_db
    user: hostel_user
